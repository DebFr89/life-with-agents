<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0b1d33">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sky Career">
<title>Sky Career</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0b1d33; color: #eaf2ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #game {
    display: block; width: 100vw; height: 100vh;
    touch-action: none;
  }
  /* Rotate-to-landscape nudge (iOS orientation lock is unreliable) */
  #rotate {
    position: fixed; inset: 0; z-index: 10;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; text-align: center; padding: 24px;
    background: #0b1d33;
  }
  #rotate .icon { font-size: 64px; animation: spin 2.4s ease-in-out infinite; }
  #rotate p { font-size: 18px; opacity: 0.85; letter-spacing: 0.3px; }
  @keyframes spin { 0%,100% { transform: rotate(0); } 50% { transform: rotate(90deg); } }
  @media (orientation: portrait) { #rotate { display: flex; } #game { visibility: hidden; } }
  #boot {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0b1d33; color: #6f8db5; font-size: 15px; letter-spacing: 1px; z-index: 5;
  }
</style>

<canvas id="game"></canvas>

<div id="rotate">
  <div class="icon">📱</div>
  <p>Rotate your device to landscape to fly ✈️</p>
</div>

<div id="boot">LOADING…</div>

<script type="module" src="src/main.js"></script>
